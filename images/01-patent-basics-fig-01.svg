  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">The Patent That Lit the World</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">U.S. Patent No. 223,898 — Edison's incandescent lamp, granted 1880</text>

  <!-- Central node -->
  <rect x="270" y="98" width="160" height="64" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="350" y="124" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="600" fill="#2a1a0e">The patent bargain</text>
  <text x="350" y="142" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">monopoly for disclosure</text>

  <!-- Inventor gives: disclosure -->
  <rect x="40" y="98" width="180" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="130" y="122" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Inventor discloses</text>
  <text x="130" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">drawings + text made public</text>

  <!-- Inventor receives: exclusivity -->
  <rect x="480" y="98" width="180" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="570" y="122" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Inventor receives</text>
  <text x="570" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">17-yr exclusive right</text>

  <line x1="220" y1="126" x2="266" y2="126" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
