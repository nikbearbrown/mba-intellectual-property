  <text x="350" y="344" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">The paradox: a monopoly that accelerated innovation</text>
  <text x="350" y="362" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">forced disclosure + protected commercialization + the chase to design around</text>
