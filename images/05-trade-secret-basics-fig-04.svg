  <rect x="40" y="86" width="190" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="135" y="106" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Physical security</text>
  <text x="135" y="122" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">locked rooms, badges</text>

  <rect x="255" y="86" width="190" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="350" y="106" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Digital security</text>
  <text x="350" y="122" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">encryption, access logs</text>

  <rect x="470" y="86" width="190" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="565" y="106" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Legal protections</text>
  <text x="565" y="122" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">employee &amp; vendor NDAs</text>

