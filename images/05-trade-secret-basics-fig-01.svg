<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01">
  <title id="fig-title-01">The vault in Atlanta</title>
  <desc>Trade-secret protection is indefinite without registration or disclosure, but conditional on secrecy: it ends the moment the information becomes public, and reverse engineering does not infringe.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Introduction to Intellectual Property: with LLMs" book-slug="mba-intellectual-property" chapter="05-trade-secret-basics" figure-number="01" figure-title="The vault in Atlanta" figure-slug="the-vault-in-atlanta" figure-type="Conceptual map" priority="Critical" author="Humanitarians AI" date-generated="2026-05-29" source-file="pantry/05-trade-secret-basics-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e" font-weight="600">The vault in Atlanta</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Trade-secret protection is conditional on one thing: the secret stays secret.</text>

  <!-- central anchor -->
  <rect x="262" y="160" width="176" height="64" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="350" y="186" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">TRADE SECRET</text>
  <text x="350" y="203" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">confidential commercial</text>
  <text x="350" y="217" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">information (e.g. a formula)</text>

  <!-- supporting: reasonable measures -->
  <rect x="40" y="100" width="190" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="135" y="123" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Reasonable measures</text>
  <text x="135" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">vault, NDAs, access limits</text>

  <!-- benefit: indefinite, no filing -->
  <rect x="470" y="100" width="190" height="56" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="565" y="123" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Indefinite protection</text>
  <text x="565" y="140" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">no registration, no expiry</text>

  <line x1="195" y1="156" x2="270" y2="178" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="505" y1="156" x2="430" y2="178" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="120" y="174" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" font-style="italic">maintains</text>
  <text x="540" y="174" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" font-style="italic">yields</text>

  <!-- limiting condition: protection ends if public -->
  <rect x="40" y="262" width="270" height="64" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="175" y="285" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Limiting condition</text>
  <text x="175" y="303" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">If the secret becomes public,</text>
  <text x="175" y="317" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">protection ends forever.</text>

  <!-- not infringement -->
  <rect x="390" y="262" width="270" height="64" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="525" y="285" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Not misappropriation</text>
  <text x="525" y="303" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">reverse engineering and</text>
  <text x="525" y="317" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">independent invention are legal</text>

  <line x1="310" y1="224" x2="220" y2="258" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="224" x2="480" y2="258" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="32" y="368" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The Coca-Cola formula, never patented, has been protected this way for over a century — and would vanish the day it leaked.</text>
</svg>
