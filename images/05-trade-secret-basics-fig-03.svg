<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-03">
  <title id="fig-title-03">Misappropriation</title>
  <desc>Misappropriation is wrongful acquisition, disclosure or use of a trade secret; independent development, reverse engineering and public disclosure are lawful and do not infringe.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Introduction to Intellectual Property: with LLMs" book-slug="mba-intellectual-property" chapter="05-trade-secret-basics" figure-number="03" figure-title="Misappropriation" figure-slug="misappropriation" figure-type="Conceptual map" priority="Critical" author="Humanitarians AI" date-generated="2026-05-29" source-file="pantry/05-trade-secret-basics-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e" font-weight="600">Misappropriation</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Wrongful acquisition, disclosure or use — distinguished from lawful competitive intelligence.</text>

  <!-- left column: IS misappropriation -->
  <text x="48" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#C8102E" font-weight="600">IS misappropriation</text>

  <rect x="32" y="104" width="300" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="48" y="125" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Acquisition by improper means</text>
  <text x="48" y="142" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">theft, bribery, espionage, hacking</text>

  <rect x="32" y="162" width="300" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="48" y="183" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Use by a knowing receiver</text>
  <text x="48" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">received a secret known to be stolen</text>

  <rect x="32" y="220" width="300" height="50" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="48" y="241" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Breach of a duty of secrecy</text>
  <text x="48" y="258" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">employee/partner under NDA discloses</text>

  <!-- right column: NOT misappropriation -->
  <text x="384" y="92" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">NOT misappropriation</text>

  <rect x="368" y="104" width="300" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="384" y="125" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Independent development</text>
  <text x="384" y="142" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">invented without access to the secret</text>

  <rect x="368" y="162" width="300" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="384" y="183" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Reverse engineering</text>
  <text x="384" y="200" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">analyzing a lawfully bought product</text>

  <rect x="368" y="220" width="300" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="384" y="241" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Information now public</text>
  <text x="384" y="258" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">leaked or published &#8594; status lost</text>

  <!-- dividing reference line -->
  <line x1="350" y1="100" x2="350" y2="274" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="5 4"/>

  <text x="32" y="312" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Structural effect</text>
  <text x="32" y="332" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Trade secrets are protected against industrial espionage but not against ordinary market competition.</text>
  <text x="32" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A holder who wants protection against reverse engineering must use patents instead — the choice in the next section.</text>
</svg>
