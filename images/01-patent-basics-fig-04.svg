  <text x="185" y="104" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="600" fill="#2a1a0e">Bargain theory</text>

  <rect x="370" y="82" width="290" height="34" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="515" y="104" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="600" fill="#2a1a0e">Natural rights theory</text>

  <!-- Row axis labels -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454" letter-spacing="0.08em">
    <text x="40" y="142" >CORE CLAIM</text>
    <text x="40" y="212" >WHY GRANT IT</text>
    <text x="40" y="282" >TERM LENGTH SET BY</text>
    <text x="40" y="352" >LEGAL HERITAGE</text>
  </g>

  <!-- Bargain column cells -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">
    <rect x="40" y="150" width="290" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="56" y="170">Quid pro quo: disclosure</text>
    <text x="56" y="187">in exchange for exclusivity</text>

    <rect x="40" y="220" width="290" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="56" y="240">Utilitarian — produces more</text>
    <text x="56" y="257">total innovation</text>

    <rect x="40" y="290" width="290" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="56" y="310">Empirically — only as long</text>
    <text x="56" y="327">as needed to incentivize</text>

    <rect x="40" y="360" width="290" height="44" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="56" y="382">U.S. Constitution ("promote</text>
    <text x="56" y="398">the progress...")</text>
  </g>

  <!-- Natural rights column cells -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">
    <rect x="370" y="150" width="290" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="386" y="170">Inherent moral claim to</text>
    <text x="386" y="187">one's intellectual labor</text>

    <rect x="370" y="220" width="290" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="386" y="240">Recognizes a pre-existing</text>
    <text x="386" y="257">right; does not create it</text>

    <rect x="370" y="290" width="290" height="50" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="386" y="310">Moral entitlement —</text>
    <text x="386" y="327">regardless of incentive math</text>

    <rect x="370" y="360" width="290" height="44" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
    <text x="386" y="382">Post-revolutionary French</text>
    <text x="386" y="398">and continental systems</text>
