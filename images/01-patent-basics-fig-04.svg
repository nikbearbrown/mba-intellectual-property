  <title id="fig-title-04">Bargain theory vs. natural rights theory</title>
  <desc>Two justifications for patents compared on the same axes: bargain theory frames a quid pro quo for disclosure with empirically set terms; natural rights theory frames an inherent moral entitlement.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Introduction to Intellectual Property: with LLMs" book-slug="mba-intellectual-property" chapter="01-patent-basics" figure-number="04" figure-title="Bargain theory vs. natural rights theory" figure-slug="bargain-theory-vs-natural-rights-theory" figure-type="Comparison panels" priority="Important" author="Humanitarians AI" date-generated="2026-05-29" source-file="pantry/01-patent-basics-cajal.md"/>
