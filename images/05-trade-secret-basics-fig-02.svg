<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">The three-element definition</title>
  <desc>Under the DTSA and UTSA, information qualifies as a trade secret only if all three elements hold: not generally known, independent economic value from secrecy, and reasonable secrecy measures.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Introduction to Intellectual Property: with LLMs" book-slug="mba-intellectual-property" chapter="05-trade-secret-basics" figure-number="02" figure-title="The three-element definition" figure-slug="the-three-element-definition" figure-type="Conceptual map" priority="Critical" author="Humanitarians AI" date-generated="2026-05-29" source-file="pantry/05-trade-secret-basics-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e" font-weight="600">The three-element definition</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">DTSA (2016) and UTSA converge: all three elements must hold, or there is no trade secret.</text>

  <!-- three element boxes -->
  <rect x="32" y="96" width="200" height="96" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="132" y="120" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">1. Not generally known</text>
  <text x="132" y="144" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">not readily ascertainable</text>
  <text x="132" y="160" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">by industry; not public.</text>
  <text x="132" y="180" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" font-style="italic">a few bound insiders OK</text>

  <rect x="250" y="96" width="200" height="96" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="350" y="120" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">2. Economic value</text>
  <text x="350" y="144" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">independent value derived</text>
  <text x="350" y="160" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">from being secret.</text>
  <text x="350" y="180" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" font-style="italic">formulas, lists, processes</text>

  <rect x="468" y="96" width="200" height="96" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="568" y="120" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">3. Reasonable measures</text>
  <text x="568" y="144" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">active effort to keep it</text>
  <text x="568" y="160" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">secret (sliding scale).</text>
  <text x="568" y="180" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#C8102E" font-style="italic">the element most often missed</text>

  <!-- AND junction -->
  <line x1="132" y1="192" x2="320" y2="244" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="192" x2="350" y2="242" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="568" y1="192" x2="380" y2="244" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="225" y="222" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">AND</text>
  <text x="450" y="222" text-anchor="end" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">AND</text>

  <!-- result -->
  <rect x="250" y="252" width="200" height="56" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="350" y="276" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Protectable TRADE SECRET</text>
  <text x="350" y="294" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">all three elements satisfied</text>

  <text x="32" y="350" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Miss any one element &#8594; no protection</text>
  <text x="32" y="370" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A formula left on an unrestricted shared drive with no NDAs fails element 3 — even if valuable and not generally known.</text>
  <text x="32" y="388" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The structure buys flexibility (almost any valuable information can qualify) at the cost of continuous internal effort.</text>
</svg>
