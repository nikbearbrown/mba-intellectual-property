<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-05">
  <title id="fig-title-05">The patent vs. trade secret strategy choice</title>
  <desc>A utility patent expires after a fixed 20-year term, while trade-secret protection lasts indefinitely as long as secrecy holds — Coca-Cola's formula has been protected for over 138 years and counting.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Introduction to Intellectual Property: with LLMs" book-slug="mba-intellectual-property" chapter="05-trade-secret-basics" figure-number="05" figure-title="The patent vs. trade secret strategy choice" figure-slug="the-patent-vs-trade-secret-strategy-choice" figure-type="Statistical / quantitative" priority="Important" author="Humanitarians AI" date-generated="2026-05-29" source-file="pantry/05-trade-secret-basics-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="16" fill="#2a1a0e" font-weight="600">The patent vs. trade secret strategy choice</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Protection duration: a patent's fixed 20-year term vs. trade secrecy's open-ended life (years).</text>

  <!-- plot region -->
  <rect x="80" y="84" width="588" height="266" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- y axis -->
  <line x1="80" y1="84" x2="80" y2="350" stroke="#2a1a0e" stroke-width="1"/>
  <!-- x axis (zero baseline) -->
  <line x1="80" y1="350" x2="668" y2="350" stroke="#2a1a0e" stroke-width="1"/>

  <!-- y gridlines / ticks: scale 0..150 years over 266px (84..350). 1 year = 1.773px -->
  <!-- 0 -->
  <text x="72" y="354" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">0</text>
  <!-- 50 -> y = 350 - 50*1.773 = 261.3 -->
  <line x1="80" y1="261" x2="668" y2="261" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="72" y="265" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">50</text>
  <!-- 100 -> y = 350 - 100*1.773 = 172.7 -->
  <line x1="80" y1="173" x2="668" y2="173" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="72" y="177" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">100</text>
  <!-- 150 -> y = 350 - 150*1.773 = 84 -->
  <text x="72" y="88" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">150</text>

  <text x="40" y="220" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454" transform="rotate(-90 40 220)">years of protection</text>

  <!-- Bar 1: utility patent = 20 yrs -> height 20*1.773 = 35.5 -->
  <rect x="180" y="314.5" width="120" height="35.5" fill="#2a1a0e"/>
  <text x="240" y="306" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">20 yrs (fixed)</text>

  <!-- Bar 2: trade secret realized = 138 yrs -> height 138*1.773 = 244.7 -->
  <rect x="448" y="105.3" width="120" height="244.7" fill="#C8102E"/>
  <text x="508" y="97" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">138+ yrs (and counting)</text>

  <!-- x category labels -->
  <text x="240" y="372" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Patent</text>
  <text x="240" y="388" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">expires; then public domain</text>

  <text x="508" y="372" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" fill="#2a1a0e" font-weight="600">Trade secret</text>
  <text x="508" y="388" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">indefinite while secrecy holds</text>

  <!-- trade-off note -->
  <text x="32" y="424" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">But the bars are not the whole story</text>
  <text x="32" y="442" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Patents require disclosure and bar even independent invention; trade secrets need no disclosure but fall to</text>
  <text x="32" y="458" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">reverse engineering, independent development, or any leak. The choice is binary at the point of filing.</text>
</svg>
