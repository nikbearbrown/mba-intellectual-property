  <line x1="380" y1="234" x2="460" y2="286" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="32" y="386" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Rights can arise from common-law use; federal registration is administered by the USPTO.</text>
