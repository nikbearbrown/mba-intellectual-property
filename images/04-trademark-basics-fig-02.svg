  <!-- goals below -->
  <rect x="120" y="290" width="200" height="54" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="220" y="313" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e" font-weight="600">Primary goal:</text>
  <text x="220" y="329" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">prevent consumer confusion</text>

