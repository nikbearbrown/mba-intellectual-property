<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-05">
  <title id="fig-title-05">The three statutory requirements for patentability</title>
  <desc>An invention must clear three statutory tests under 35 U.S.C. 101 to 103 — utility, novelty, and non-obviousness — to be patentable; failing any one defeats the application.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Introduction to Intellectual Property: with LLMs" book-slug="mba-intellectual-property" chapter="01-patent-basics" figure-number="05" figure-title="The three statutory requirements for patentability" figure-slug="the-three-statutory-requirements-for-patentability" figure-type="Conceptual map" priority="Important" author="Humanitarians AI" date-generated="2026-05-29" source-file="pantry/01-patent-basics-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">Three Requirements for Patentability</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Codified in 35 U.S.C. §§ 101–103 — an invention must clear all three</text>

  <!-- Central node -->
  <rect x="270" y="98" width="160" height="60" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="350" y="124" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="600" fill="#2a1a0e">Patentable</text>
  <text x="350" y="142" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">invention</text>

  <!-- Three requirement nodes -->
  <rect x="40" y="220" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="135" y="244" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Utility (§ 101)</text>
  <text x="135" y="263" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">specific, substantial,</text>
  <text x="135" y="279" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">credible benefit</text>
  <text x="135" y="293" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">low bar</text>

  <rect x="255" y="220" width="190" height="78" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="350" y="244" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Novelty (§ 102)</text>
  <text x="350" y="263" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">new vs. prior art;</text>
  <text x="350" y="279" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">first-inventor-to-file</text>
  <text x="350" y="293" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">AIA 2011</text>

  <rect x="470" y="220" width="190" height="78" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="565" y="244" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Non-obviousness (§103)</text>
  <text x="565" y="263" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">not obvious to a PHOSITA;</text>
  <text x="565" y="279" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Graham factors</text>
  <text x="565" y="293" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">most litigated</text>

  <line x1="300" y1="158" x2="155" y2="216" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="158" x2="350" y2="216" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="158" x2="545" y2="216" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="190" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">must satisfy each</text>

  <text x="32" y="346" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Worked example: a pencil with an attached eraser passes utility, but fails novelty and non-obviousness.</text>
  <text x="32" y="368" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The three-prong test buys quality of issued patents at the cost of examination complexity.</text>
</svg>
