    <text x="490" y="256" text-anchor="middle" font-size="10" fill="#545454">surrendered</text>
    <text x="490" y="270" text-anchor="middle" font-size="10" fill="#545454">scope barred</text>

    <rect x="560" y="200" width="108" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
