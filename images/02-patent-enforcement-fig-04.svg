  <text x="350" y="118" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="600" fill="#2a1a0e">Accused infringer</text>
  <text x="350" y="136" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">may assert</text>

  <!-- Five defense nodes -->
  <g font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif">
    <rect x="32" y="200" width="124" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="94" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#2a1a0e">Invalidity</text>
    <text x="94" y="240" text-anchor="middle" font-size="10" fill="#545454">never should</text>
    <text x="94" y="254" text-anchor="middle" font-size="10" fill="#545454">have issued;</text>
    <text x="94" y="268" text-anchor="middle" font-size="10" fill="#545454">clear &amp; convincing</text>

    <rect x="164" y="200" width="124" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="226" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#2a1a0e">Non-</text>
    <text x="226" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#2a1a0e">infringement</text>
    <text x="226" y="256" text-anchor="middle" font-size="10" fill="#545454">missing a</text>
    <text x="226" y="270" text-anchor="middle" font-size="10" fill="#545454">claim element</text>

    <rect x="296" y="200" width="124" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
    <text x="358" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#2a1a0e">Inequitable</text>
    <text x="358" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#2a1a0e">conduct</text>
    <text x="358" y="256" text-anchor="middle" font-size="10" fill="#545454">misled USPTO;</text>
    <text x="358" y="270" text-anchor="middle" font-size="10" fill="#545454">Therasense 2011</text>

    <rect x="428" y="200" width="124" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
