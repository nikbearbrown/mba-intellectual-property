  <title id="fig-title-04">The defenses</title>
  <desc>An accused infringer can raise several independent defenses — invalidity, non-infringement, inequitable conduct, prosecution-history estoppel, and patent exhaustion — each a distinct ground.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Introduction to Intellectual Property: with LLMs" book-slug="mba-intellectual-property" chapter="02-patent-enforcement" figure-number="04" figure-title="The defenses" figure-slug="the-defenses" figure-type="Conceptual map" priority="Important" author="Humanitarians AI" date-generated="2026-05-29" source-file="pantry/02-patent-enforcement-cajal.md"/>
