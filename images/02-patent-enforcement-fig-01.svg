  <title id="fig-title-01">Opening: Polaroid v. Kodak</title>
  <desc>Polaroid's suit over Kodak's PR-10 instant camera ran fourteen years, finding infringement of seven patents, a $925M damages award, and an injunction that shut Kodak's instant-camera line.</desc>
