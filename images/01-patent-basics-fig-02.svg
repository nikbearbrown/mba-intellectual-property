<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-02">
  <title id="fig-title-02">What a patent is</title>
  <desc>A USPTO-granted right to exclude others from making, using, selling, or importing an invention, defined by three features: exclusionary not affirmative, time-limited, and tied to a disclosure duty.</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0" book="Introduction to Intellectual Property: with LLMs" book-slug="mba-intellectual-property" chapter="01-patent-basics" figure-number="02" figure-title="What a patent is" figure-slug="what-a-patent-is" figure-type="Conceptual map" priority="Critical" author="Humanitarians AI" date-generated="2026-05-29" source-file="pantry/01-patent-basics-cajal.md"/>
  </metadata>
  <rect x="0" y="0" width="700" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/></marker>
  </defs>

  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">What a Patent Is</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">A USPTO-granted right to exclude — three structural features</text>

  <!-- Central node -->
  <rect x="260" y="92" width="180" height="64" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="350" y="118" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="600" fill="#2a1a0e">U.S. utility patent</text>
  <text x="350" y="136" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">issued by the USPTO</text>

  <!-- Three feature nodes -->
  <rect x="40" y="230" width="190" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="135" y="254" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Exclusionary,</text>
  <text x="135" y="271" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">not affirmative</text>
  <text x="135" y="290" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">excludes; doesn't authorize</text>

  <rect x="255" y="230" width="190" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="350" y="254" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Limited in time</text>
  <text x="350" y="272" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#545454">20 yrs from filing</text>
  <text x="350" y="290" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">then public domain</text>

  <rect x="470" y="230" width="190" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="565" y="254" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Carries a duty</text>
  <text x="565" y="272" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">full public disclosure,</text>
  <text x="565" y="290" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">enabling a PHOSITA</text>

  <!-- Edges -->
  <line x1="300" y1="156" x2="150" y2="226" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="156" x2="350" y2="226" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="156" x2="550" y2="226" stroke="#2a1a0e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right to exclude detail -->
  <rect x="160" y="170" width="380" height="30" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="350" y="190" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">right to exclude others from making, using, selling, or importing</text>

  <text x="32" y="356" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Enforceable only in the U.S.; international protection needs national filings or the PCT.</text>
  <text x="32" y="378" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">Trade secrets work the opposite way — they require the invention to stay secret.</text>
</svg>
