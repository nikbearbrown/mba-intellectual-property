  <text x="32" y="40" font-family="'EB Garamond','Garamond',Georgia,serif" font-size="18" fill="#2a1a0e">Claim Construction</text>
  <text x="32" y="60" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">The judge decides what the claim words mean — Markman v. Westview (1996)</text>

  <!-- Actor: judge / Markman -->
  <rect x="270" y="92" width="160" height="64" fill="#FFFFFF" stroke="#C8102E" stroke-width="2"/>
  <text x="350" y="118" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="13" font-weight="600" fill="#2a1a0e">Markman hearing</text>
  <text x="350" y="136" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">judge construes terms</text>
  <text x="350" y="152" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">(a question of law)</text>

  <!-- Intrinsic evidence (primary) -->
  <rect x="40" y="220" width="190" height="74" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="135" y="244" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Intrinsic evidence</text>
  <text x="135" y="262" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">claims, specification,</text>
  <text x="135" y="278" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">prosecution history</text>
  <text x="135" y="292" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">paramount</text>

  <!-- Extrinsic evidence -->
  <rect x="255" y="220" width="190" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="350" y="244" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">Extrinsic evidence</text>
  <text x="350" y="262" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">dictionaries, treatises,</text>
  <text x="350" y="278" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">expert testimony</text>
  <text x="350" y="292" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">secondary</text>

  <!-- PHOSITA lens -->
  <rect x="470" y="220" width="190" height="74" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="565" y="244" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">PHOSITA lens</text>
  <text x="565" y="262" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">person of ordinary</text>
  <text x="565" y="278" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#545454">skill in the art</text>
  <text x="565" y="292" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">the reader</text>

