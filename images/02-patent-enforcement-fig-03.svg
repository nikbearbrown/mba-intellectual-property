  <!-- Consequence -->
  <rect x="160" y="330" width="380" height="50" fill="#FFFFFF" stroke="#C8860E" stroke-width="1.5"/>
  <text x="350" y="352" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="12" font-weight="600" fill="#2a1a0e">The construction governs the rest of the case</text>
