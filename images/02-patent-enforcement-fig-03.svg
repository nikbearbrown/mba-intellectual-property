  <title id="fig-title-03">Claim construction: the linguistic core of patent law</title>
  <desc>In a Markman hearing the judge construes disputed claim terms using intrinsic and extrinsic evidence as a PHOSITA would read them; the construction governs the infringement outcome.</desc>
